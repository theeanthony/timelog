appId: dev.timelog.app
productName: timelog
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!tests/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!vitest.config.ts'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!.github/*'
asarUnpack:
  - resources/**
  # get-windows ships a native N-API prebuild that must live outside the asar
  - '**/node_modules/get-windows/**'
win:
  executableName: timelog
  target:
    - nsis
    - portable
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
portable:
  artifactName: ${name}-${version}-portable.${ext}
# macOS build kept only for development convenience; v1 ships Windows-only.
mac:
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
# GitHub Releases provider: emits latest.yml + *.blockmap so the installed NSIS
# build can self-update with delta downloads (manual "Check for updates"). The
# app never phones home on its own — updates only run when the user asks.
# (The portable target can't auto-update; that's expected.)
publish:
  provider: github
  owner: theeanthony
  repo: timelog
