name: Release (Windows)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# electron-builder needs write access to create the GitHub Release it publishes to.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      # Compile main/preload/renderer, then package + publish the NSIS installer,
      # latest.yml, and *.blockmap to a (draft) GitHub Release. Publish the draft
      # for clients' "Check for updates" to pick it up (delta download).
      - run: npm run build
      - run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: timelog-windows
          path: |
            dist/*-setup.exe
            dist/*-portable.exe
            dist/latest.yml
          if-no-files-found: error
